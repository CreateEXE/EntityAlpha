name: Nightly — Submodule Freshness & Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.3.11579264'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-submodule:
    name: Check llama.cpp upstream
    runs-on: ubuntu-latest
    outputs:
      llama_updated: ${{ steps.check.outputs.updated }}
      llama_present: ${{ steps.check.outputs.present }}
      llama_new_sha: ${{ steps.check.outputs.new_sha }}
      llama_cur_sha: ${{ steps.check.outputs.cur_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check llama.cpp status
        id: check
        run: |
          if [ ! -f "app/src/main/cpp/llama.cpp/CMakeLists.txt" ]; then
            echo "::warning::llama.cpp submodule not initialised — skipping nightly build."
            echo "present=false" >> $GITHUB_OUTPUT
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "cur_sha=none"  >> $GITHUB_OUTPUT
            echo "new_sha=none"  >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "present=true" >> $GITHUB_OUTPUT
          CUR=$(git -C app/src/main/cpp/llama.cpp rev-parse HEAD)
          git -C app/src/main/cpp/llama.cpp fetch origin master --quiet
          NEW=$(git -C app/src/main/cpp/llama.cpp rev-parse origin/master)
          echo "cur_sha=$CUR" >> $GITHUB_OUTPUT
          echo "new_sha=$NEW" >> $GITHUB_OUTPUT
          if [ "$CUR" != "$NEW" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "::notice::llama.cpp has upstream commits: $CUR -> $NEW"
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "::notice::llama.cpp is up to date at $CUR"
          fi

  nightly-build:
    name: Nightly Debug Build
    runs-on: ubuntu-latest
    needs: check-submodule
    if: needs.check-submodule.outputs.llama_present == 'true'

    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Cache NDK artifacts
        uses: actions/cache@v5
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-nightly-${{ env.NDK_VERSION }}-${{ needs.check-submodule.outputs.llama_cur_sha }}
          restore-keys: ndk-${{ env.NDK_VERSION }}-

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v4

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" "cmake;3.22.1"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }}

      - name: Upload nightly APK
        uses: actions/upload-artifact@v6
        with:
          name: nightly-${{ github.run_number }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 3

      - name: Open issue if llama.cpp has updates
        if: needs.check-submodule.outputs.llama_updated == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[Nightly] llama.cpp upstream update available`,
              body: [
                '## llama.cpp Update Detected',
                '',
                `Current submodule: \`${{ needs.check-submodule.outputs.llama_cur_sha }}\``,
                `Upstream master:   \`${{ needs.check-submodule.outputs.llama_new_sha }}\``,
                '',
                'To update in Termux:',
                '```bash',
                'cd Backend_Alpha',
                'git -C app/src/main/cpp/llama.cpp pull origin master',
                'git add app/src/main/cpp/llama.cpp',
                'git commit -m "chore: update llama.cpp submodule"',
                'git push',
                '```',
                '',
                `Triggered by nightly run #${{ github.run_number }}`,
              ].join('\n'),
              labels: ['dependencies', 'llama.cpp'],
            });
