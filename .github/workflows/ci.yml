name: CI — Build & Validate

on:
  push:
    branches: [ master, main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Force debug APK upload even on PR'
        required: false
        default: 'false'
        type: boolean

# Cancel redundant runs on same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.3.11579264'
  # llama.cpp CMake flags for Cortex-A78 (Revvl 7)
  LLAMA_CMAKE_ARGS: >-
    -DGGML_NEON=ON
    -DGGML_ARM_DOTPROD=ON
    -DGGML_ARM_I8MM=ON
    -DGGML_FP16_VA=ON
    -DGGML_VULKAN=OFF
    -DGGML_OPENCL=OFF
    -DLLAMA_BUILD_TESTS=OFF
    -DLLAMA_BUILD_EXAMPLES=OFF
    -DLLAMA_BUILD_SERVER=OFF
    -DBUILD_SHARED_LIBS=OFF

jobs:
  # ─────────────────────────────────────────────────────────
  #  JOB 1: Validate — lint + ktlint (fast, no NDK)
  # ─────────────────────────────────────────────────────────
  validate:
    name: Lint & KtLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # Don't need llama.cpp for lint

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lint --no-daemon --stacktrace
        continue-on-error: true   # Lint failures are warnings, not blockers in CI

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  #  JOB 2: Build Debug APK (with NDK + llama.cpp)
  # ─────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls llama.cpp
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # Cache both Gradle AND the NDK build output.
      # The NDK output (libllama + projectexe_jni .so) is ~800MB
      # and takes 15+ min to compile. Cache key includes llama.cpp HEAD SHA.
      - name: Get llama.cpp submodule SHA
        id: llama_sha
        run: echo "sha=$(git -C app/src/main/cpp/llama.cpp rev-parse HEAD 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT

      - name: Cache NDK build artifacts
        uses: actions/cache@v4
        id: ndk-cache
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-
            ndk-${{ env.NDK_VERSION }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Verify llama.cpp submodule
        run: |
          if [ ! -f "app/src/main/cpp/llama.cpp/CMakeLists.txt" ]; then
            echo "::error::llama.cpp submodule missing. Run: git submodule update --init --recursive"
            exit 1
          fi
          echo "llama.cpp SHA: $(git -C app/src/main/cpp/llama.cpp rev-parse HEAD)"
          echo "llama.cpp files: $(find app/src/main/cpp/llama.cpp -name '*.cpp' | wc -l) .cpp files"

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            2>&1 | tee build.log

      - name: Check build log for warnings
        run: |
          # Flag any OOM or critical NDK warnings
          grep -i "out of memory\|FAILED\|error:" build.log | head -20 || true

      - name: Collect APK info
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK: $APK ($SIZE)"
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "APK_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Upload Debug APK
        if: github.event_name == 'push' || github.event.inputs.debug_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure
          path: build.log
          retention-days: 7

      - name: PR comment with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success'
              ? '✅ Debug APK built successfully'
              : '❌ Debug APK build failed';
            const size = '${{ env.APK_SIZE }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Build Result\n${status}\nAPK Size: ${size || 'N/A'}\nCommit: \`${context.sha.slice(0,7)}\``
            });
