name: CI — Build & Validate

on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Force debug APK upload even on PR'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.3.11579264'

jobs:
  # ─────────────────────────────────────────────────────────
  #  JOB 1: Lint (no NDK needed)
  # ─────────────────────────────────────────────────────────
  validate:
    name: Lint & KtLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      - name: Grant gradlew execute
        run: chmod +x gradlew

      # lintDebug targets only the debug variant and writes
      # app/build/reports/lint-results-debug.html
      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon --continue
        continue-on-error: true

      # Show what lint actually wrote so the glob never silently misses
      - name: List lint outputs
        if: always()
        run: find app/build/reports -name '*.html' -o -name '*.xml' 2>/dev/null || echo "No lint reports found"

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-report-${{ github.sha }}
          # Double-star covers both the root reports dir and any variant subdir
          path: app/build/reports/**/lint-results*.html
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  #  JOB 2: Build Debug APK
  # ─────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Get llama.cpp submodule SHA
        id: llama_sha
        run: echo "sha=$(git -C app/src/main/cpp/llama.cpp rev-parse HEAD 2>/dev/null || echo 'none')" >> $GITHUB_OUTPUT

      - name: Cache NDK build artifacts
        uses: actions/cache@v5
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-
            ndk-${{ env.NDK_VERSION }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Verify llama.cpp submodule
        run: |
          if [ ! -f "app/src/main/cpp/llama.cpp/CMakeLists.txt" ]; then
            echo "::error::llama.cpp submodule missing. Run: git submodule update --init --recursive"
            exit 1
          fi
          echo "llama.cpp SHA: $(git -C app/src/main/cpp/llama.cpp rev-parse HEAD)"

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            2>&1 | tee build.log

      - name: Collect APK info
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK: $APK ($SIZE)"
          echo "APK_PATH=$APK"   >> $GITHUB_ENV
          echo "APK_SIZE=$SIZE"  >> $GITHUB_ENV

      - name: Upload Debug APK
        if: github.event_name == 'push' || github.event.inputs.debug_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk-${{ github.sha }}
  
