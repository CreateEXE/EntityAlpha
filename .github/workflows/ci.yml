name: CI — Build & Validate

on:
  push:
    branches: [ master, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Force debug APK upload even on PR'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.3.11579264'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Lint & KtLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Download gradle-wrapper.jar
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon --continue
        continue-on-error: true

      - name: List lint outputs
        if: always()
        run: |
          find app/build/reports -name '*.html' -o -name '*.xml' 2>/dev/null \
            || echo "No lint reports found"

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/**/lint-results*.html
          if-no-files-found: warn
          retention-days: 7

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Download gradle-wrapper.jar
        run: |
          curl -sSfL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Get llama.cpp submodule SHA
        id: llama_sha
        run: |
          SHA=$(git -C app/src/main/cpp/llama.cpp rev-parse HEAD 2>/dev/null || echo 'none')
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "llama.cpp SHA: $SHA"

      - name: Cache NDK build artifacts
        uses: actions/cache@v5
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-
            ndk-${{ env.NDK_VERSION }}-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            2>&1 | tee build.log

      - name: Upload Debug APK
        if: github.event_name == 'push' || github.event.inputs.debug_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-failure-${{ github.sha }}
          path: build.log
          if-no-files-found: warn
          retention-days: 7
