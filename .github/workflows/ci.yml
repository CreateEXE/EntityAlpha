name: CI — Build & Validate

on:
  push:
    branches: [ master, develop, 'feature/**', 'fix/**' ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:
    inputs:
      debug_build:
        description: 'Force debug APK upload even on PR'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'
  NDK_VERSION:  '26.3.11579264'

jobs:
  # ─────────────────────────────────────────────────────────
  #  JOB 1: Lint
  # ─────────────────────────────────────────────────────────
  validate:
    name: Lint & KtLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}

      # Download the wrapper jar if it is missing (binary — cannot be stored as text in GitHub browser)
      - name: Ensure gradle-wrapper.jar exists
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            echo "gradle-wrapper.jar missing — downloading..."
            mkdir -p gradle/wrapper
            curl -sSL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "Downloaded: $(du -sh $JAR | cut -f1)"
          else
            echo "gradle-wrapper.jar present: $(du -sh $JAR | cut -f1)"
          fi

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Run Android Lint
        run: ./gradlew lintDebug --no-daemon --continue
        continue-on-error: true

      - name: List lint outputs
        if: always()
        run: |
          find app/build/reports -name '*.html' -o -name '*.xml' 2>/dev/null \
            || echo "No lint reports found"

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/**/lint-results*.html
          if-no-files-found: warn
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  #  JOB 2: Build Debug APK
  # ─────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout + submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Ensure gradle-wrapper.jar exists
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            echo "gradle-wrapper.jar missing — downloading..."
            mkdir -p gradle/wrapper
            curl -sSL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "Downloaded: $(du -sh $JAR | cut -f1)"
          else
            echo "gradle-wrapper.jar present: $(du -sh $JAR | cut -f1)"
          fi

      - name: Get llama.cpp submodule SHA
        id: llama_sha
        run: |
          SHA=$(git -C app/src/main/cpp/llama.cpp rev-parse HEAD 2>/dev/null || echo 'none')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Cache NDK build artifacts
        uses: actions/cache@v5
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: |
            ndk-${{ env.NDK_VERSION }}-${{ steps.llama_sha.outputs.sha }}-
            ndk-${{ env.NDK_VERSION }}-

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Check llama.cpp submodule
        id: check_llama
        run: |
          if [ ! -f "app/src/main/cpp/llama.cpp/CMakeLists.txt" ]; then
            echo "::warning::llama.cpp submodule is not initialised."
            echo "present=false" >> $GITHUB_OUTPUT
          else
            echo "llama.cpp SHA: $(git -C app/src/main/cpp/llama.cpp rev-parse HEAD)"
            echo "present=true" >> $GITHUB_OUTPUT
          fi

      - name: Grant gradlew execute
        run: chmod +x gradlew

      - name: Build Debug APK
        if: steps.check_llama.outputs.present == 'true'
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }} \
            2>&1 | tee build.log

      - name: Skip notice (llama.cpp missing)
        if: steps.check_llama.outputs.present == 'false'
        run: |
          echo "APK build skipped — llama.cpp submodule missing."
          echo "Run in Termux: git submodule add https://github.com/ggerganov/llama.cpp app/src/main/cpp/llama.cpp"

      - name: Collect APK info
        if: steps.check_llama.outputs.present == 'true'
        run: |
          APK=$(find app/build/outputs/apk/debug -name '*.apk' 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found — build may have failed. Check build.log above."
