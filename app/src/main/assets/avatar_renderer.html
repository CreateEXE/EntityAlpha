<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: transparent; }
  canvas { display: block; width: 100%; height: 100%; outline: none; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.2/lib/three-vrm.module.min.js"
  }
}
</script>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

function notifyKotlin(method, arg) {
  try { window.AndroidBridge[method](arg ?? ''); } catch (_) {}
}

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true, logarithmicDepthBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
camera.position.set(0, 1.35, 1.8);
camera.lookAt(0, 1.35, 0);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(2, 3, 2);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);

const gltfLoader = new GLTFLoader();
gltfLoader.register(parser => new VRMLoaderPlugin(parser, { autoUpdateHumanBones: true }));

let currentModel = null;
let currentVRM = null;
const clock = new THREE.Clock();

function normalizeScaleAndCenter(object) {
    const box = new THREE.Box3().setFromObject(object);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const scaleFactor = 1.4 / size.y;
    object.scale.setScalar(scaleFactor);
    object.position.x = -center.x * scaleFactor;
    object.position.y = (-center.y * scaleFactor) + 0.7 - 0.7; 
    object.position.z = -center.z * scaleFactor;
    object.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
}

window.AvatarAPI = {
  loadModel(url, ext) {
    if (currentModel) { scene.remove(currentModel); currentModel = null; }
    if (currentVRM) { scene.remove(currentVRM.scene); currentVRM = null; }

    const onModelLoaded = (obj, isVrm = false) => {
        normalizeScaleAndCenter(obj);
        scene.add(obj);
        currentModel = obj;
        notifyKotlin('onModelLoaded', `Loaded: ${ext}`);
    };

    if (ext.endsWith('.obj')) { new OBJLoader().load(url, obj => onModelLoaded(obj)); } 
    else if (ext.endsWith('.fbx')) { new FBXLoader().load(url, fbx => onModelLoaded(fbx)); } 
    else {
        gltfLoader.load(url, gltf => {
            if (gltf.userData.vrm) {
                VRMUtils.rotateVRM0(gltf.userData.vrm);
                currentVRM = gltf.userData.vrm;
                onModelLoaded(currentVRM.scene, true);
            } else { onModelLoaded(gltf.scene); }
        });
    }
  }
};

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  if (currentVRM) currentVRM.update(delta);
  renderer.render(scene, camera);
}
animate();
notifyKotlin('onRendererReady', '');
</script>
</body>
</html>
